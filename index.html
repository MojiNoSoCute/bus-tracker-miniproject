<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e63462" />
  <title>Bus Tracker - ติดตามสด</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
<header id="site-header" class="sticky-top"></header>

<main class="container-xl px-3 py-4">

  <!-- Map Card -->
  <div class="card border rounded-4 mb-3 p-3">
    <div class="d-flex align-items-center gap-3 mb-3">
      <div class="card-icon" style="background:rgba(229,57,53,0.1)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#E53935" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div>
        <div class="fw-bold fs-5">แผนที่เส้นทางรถเมล์ไฟฟ้า</div>
        <div class="text-muted small">เส้นทางวนรอบภายในมหาวิทยาลัย · 3 คัน</div>
      </div>
    </div>
    <svg id="map-svg" viewBox="0 0 600 360"></svg>
    <div class="d-flex flex-wrap gap-3 mt-2" id="map-legend"></div>
  </div>

  <!-- Bus Cards -->
  <div class="row g-3" id="bus-cards"></div>

  <!-- Stop Timeline -->
  <div class="card border rounded-4 mt-3 p-3">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <div class="d-flex align-items-center gap-3">
        <div class="card-icon" style="background:rgba(255,152,0,0.1)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF9800" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div>
          <div class="fw-bold fs-5">เวลาเทียบและจุดจอด</div>
          <div class="text-muted small">อัพเดต: ข้อมูลจราจรล่าสุดทุกจุดจอด · 3 คัน</div>
        </div>
      </div>
      <span class="live-badge" style="background:#F44336"><span class="live-dot"></span>LIVE</span>
    </div>
    <div class="stop-grid" id="stop-timeline"></div>
  </div>

</main>

<footer id="site-footer" class="border-top bg-white py-4 text-center"></footer>

<script src="shared.js"></script>
<script>
/**
 * index.html (หน้าติดตามสด)
 * แสดงตำแหน่งรถแบบ real-time ผ่าน 3 ส่วน:
 *   1. SVG Map - แผนที่วงรีแสดงตำแหน่งรถและจุดจอด
 *   2. Bus Cards - card รายละเอียดรถแต่ละคัน
 *   3. Stop Timeline - grid สถานะรถที่แต่ละจุดจอด
 *
 * Simulation วิ่งทุก SIM_TICK ms และ save state ลง localStorage
 * เพื่อให้หน้าอื่นเห็นตำแหน่งรถล่าสุดเมื่อสลับกลับมา
 */

// โหลด state รถจาก localStorage (หรือค่าเริ่มต้นถ้ายังไม่มี)
let buses = loadBuses();

// ===== MAP =====
/**
 * คำนวณพิกัด (mx, my) ของแต่ละจุดจอดบน SVG
 * วางจุดจอดเป็นวงรีโดยใช้ trigonometry
 * - ศูนย์กลาง: (300, 170) ใน viewBox 600×360
 * - รัศมีแกน X: 220, รัศมีแกน Y: 120
 * - เริ่มจากมุม -π/2 (บนสุด) วนตามเข็มนาฬิกา
 * @returns {Array} stops พร้อม mx, my
 */
function getMapPositions() {
  return stops.map((s, i) => {
    const angle = (i / stops.length) * Math.PI * 2 - Math.PI / 2;
    return { ...s, mx: 300 + 220 * Math.cos(angle), my: 170 + 120 * Math.sin(angle) };
  });
}

/**
 * คำนวณพิกัด (x, y) ของรถบน SVG
 * - ถ้าจอดอยู่: ใช้พิกัดของจุดจอดนั้นตรงๆ
 * - ถ้ากำลังวิ่ง: interpolate เชิงเส้นระหว่างจุดปัจจุบันและจุดถัดไป
 *   ตาม bus.progress (0.0 = เพิ่งออก, 1.0 = ถึงแล้ว)
 * @param {Object} bus - bus object
 * @param {Array}  mp  - map positions จาก getMapPositions()
 * @returns {{x: number, y: number}}
 */
function getBusPos(bus, mp) {
  if (bus.isDwelling) { const p = mp[bus.currentStopIndex]; return { x: p.mx, y: p.my }; }
  const c = mp[bus.currentStopIndex], nx = mp[(bus.currentStopIndex + 1) % stops.length];
  return { x: c.mx + (nx.mx - c.mx) * bus.progress, y: c.my + (nx.my - c.my) * bus.progress };
}

/**
 * Render SVG แผนที่ทั้งหมดใหม่ทุกครั้งที่เรียก
 * วาดตามลำดับ: เส้นทาง → ลูกศรทิศทาง → จุดจอด → รถที่กำลังวิ่ง
 * จุดจอดที่มีรถจอดอยู่จะแสดง animation pulse และเปลี่ยนสีตามรถ
 */
function renderMap() {
  const mp = getMapPositions();
  const svg = document.getElementById('map-svg');
  const pts = mp.map(s => `${s.mx},${s.my}`).join(' L ');
  let html = `<path d="M ${pts} Z" fill="none" stroke="#26C6DA" stroke-width="4" stroke-dasharray="10 5" opacity="0.8"/>`;
  mp.forEach((s, i) => {
    const nx = mp[(i + 1) % mp.length];
    const mx2 = (s.mx + nx.mx) / 2, my2 = (s.my + nx.my) / 2;
    const ang = Math.atan2(nx.my - s.my, nx.mx - s.mx) * 180 / Math.PI;
    html += `<g transform="translate(${mx2},${my2}) rotate(${ang})"><polygon points="0,-5 10,0 0,5" fill="#26C6DA" opacity="0.7"/></g>`;
  });
  mp.forEach((s, i) => {
    const bh = buses.find(b => b.currentStopIndex === i && b.isDwelling);
    const fill = bh ? BUS_COLORS[bh.id].main : '#9E9E9E';
    const stroke = bh ? BUS_COLORS[bh.id].main : '#BDBDBD';
    if (bh) html += `<circle cx="${s.mx}" cy="${s.my}" r="28" fill="none" stroke="${fill}" stroke-width="3" opacity="0.4"><animate attributeName="r" values="26;34;26" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/></circle>`;
    html += `<circle cx="${s.mx}" cy="${s.my}" r="22" fill="${bh ? fill : 'white'}" stroke="${stroke}" stroke-width="3"/>`;
    html += `<text x="${s.mx}" y="${s.my + 1}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="bold" fill="${bh ? 'white' : '#333'}">${s.code}</text>`;
    html += `<text x="${s.mx}" y="${s.my + 38}" text-anchor="middle" font-size="12" fill="#333" font-weight="600">${s.name}</text>`;
  });
  buses.forEach(bus => {
    if (bus.isDwelling) return;
    const pos = getBusPos(bus, mp), c = BUS_COLORS[bus.id];
    html += `<circle cx="${pos.x}" cy="${pos.y}" r="24" fill="${c.main}" opacity="0.15"><animate attributeName="r" values="22;30;22" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.05;0.2" dur="2s" repeatCount="indefinite"/></circle>`;
    html += `<circle cx="${pos.x}" cy="${pos.y}" r="18" fill="${c.main}" stroke="white" stroke-width="3"/>`;
    html += `<text x="${pos.x}" y="${pos.y + 1}" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="bold" fill="white">${bus.id}</text>`;
  });
  svg.innerHTML = html;
  document.getElementById('map-legend').innerHTML =
    buses.map(b => `<div class="d-flex align-items-center gap-2"><span class="legend-dot" style="background:${BUS_COLORS[b.id].main}">${b.id}</span><span>รถเมล์ ${b.id}</span></div>`).join('') +
    `<div class="d-flex align-items-center gap-2"><span style="width:24px;height:24px;border-radius:50%;border:3px solid #BDBDBD;background:#fff;display:inline-block"></span><span>จุดจอด</span></div>` +
    `<div class="d-flex align-items-center gap-2"><span style="width:24px;border-top:3px dashed #26C6DA;display:inline-block"></span><span>เส้นทาง</span></div>`;
}

/**
 * Render bus cards ทั้ง 3 คันใน #bus-cards
 * แต่ละ card แสดง: จุดจอดปัจจุบัน, เวลาจอดที่เหลือ,
 * จุดถัดไป + ETA, จำนวนผู้โดยสาร, แบตเตอรี่, สถานะ
 *
 * รถที่กำลังวิ่งจะมี glow effect รอบ card
 * สีแบตเตอรี่: เขียว (>50%) → ส้ม (>20%) → แดง (≤20%)
 */
function renderBusCards() {
  document.getElementById('bus-cards').innerHTML = buses.map(bus => {
    const c = BUS_COLORS[bus.id];
    const cur = stops[bus.currentStopIndex];
    const nxt = stops[(bus.currentStopIndex + 1) % stops.length];
    const etaNext = bus.isDwelling ? bus.dwellRemaining + TRAVEL_TIME : Math.round((1 - bus.progress) * TRAVEL_TIME);
    const batColor = bus.battery > 50 ? '#4CAF50' : bus.battery > 20 ? '#FF9800' : '#F44336';
    const glow = !bus.isDwelling ? `box-shadow:0 0 16px 2px ${c.main}44,0 0 0 1px ${c.main};` : '';
    return `<div class="col-md-4">
      <div class="bus-card" style="border-color:${c.main};${glow}">
        <div class="bus-card-head" style="background:${c.main}">
          <h3><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>${bus.name}</h3>
          <span class="status-badge">${!bus.isDwelling ? '<span class="ping" style="width:10px;height:10px;border-radius:50%;background:#4ade80;display:inline-block;margin-right:2px"></span>' : ''}${bus.isDwelling ? 'จอดอยู่' : bus.speed + ' กม./ชม.'}</span>
        </div>
        <div class="p-3 d-flex flex-column gap-2">
          <div class="info-box" style="background:${bus.isDwelling ? c.light : '#f3f4f6'}">
            <p class="small text-muted mb-1">${bus.isDwelling ? 'จอดอยู่ที่' : 'กำลังออกจาก'}</p>
            <div class="stop-name">${cur.name}${bus.isDwelling ? '<span class="ping" style="width:12px;height:12px;border-radius:50%;background:#ef4444;display:inline-block"></span>' : ''}</div>
            ${bus.isDwelling ? `<div class="small" style="color:${c.text}">${cur.nameEn}</div>` : ''}
          </div>
          ${bus.isDwelling ? `<div class="dwell-row" style="background:${c.light}"><span class="d-flex align-items-center gap-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${c.main}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>จอดรออีก</span><span class="dwell-timer" style="background:${c.main}">${fmtTime(bus.dwellRemaining)}</span></div>` : ''}
          <div class="next-row">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${c.main}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            <div class="flex-grow-1"><div class="small text-muted">จุดถัดไป</div><div class="fw-medium">${nxt.name}</div></div>
            <div class="text-end"><div class="small text-muted">ถึงใน</div><div class="fw-bold" style="color:${c.main}">${fmtMin(etaNext)} นาที</div></div>
          </div>
          <div class="stat-row">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span class="stat-label">ผู้โดยสาร</span>
            <div class="progress-wrap"><div class="progress-bar-custom" style="width:${Math.min(bus.passengers / 40 * 100, 100)}%;background:${c.main}"></div></div>
            <span class="stat-val">${bus.passengers}</span>
          </div>
          <div class="stat-row">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="16" height="10" rx="2" ry="2"/><line x1="22" y1="11" x2="22" y2="13"/></svg>
            <span class="stat-label">แบตเตอรี่</span>
            <div class="progress-wrap"><div class="progress-bar-custom" style="width:${bus.battery}%;background:${batColor}"></div></div>
            <span class="stat-val">${Math.round(bus.battery)}%</span>
          </div>
          <div class="status-row">
            <span class="small text-muted">สถานะ</span>
            <span class="status-pill" style="background:${c.main}"><span class="ping" style="width:8px;height:8px;border-radius:50%;background:${bus.isDwelling ? '#fca5a5' : '#86efac'};display:inline-block"></span>${bus.status}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/**
 * Render stop timeline grid ใน #stop-timeline
 * แต่ละ card จุดจอดแสดง:
 *   - รถที่จอดอยู่ (ถ้ามี) พร้อม countdown ออกใน X นาที
 *   - รถที่ใกล้มาถึงที่สุด (ETA น้อยที่สุด) จากรถที่ไม่ได้จอดอยู่
 * หัว card เปลี่ยนสีตามรถที่จอดอยู่ (หรือเทาถ้าว่าง)
 */
function renderStopTimeline() {
  document.getElementById('stop-timeline').innerHTML = stops.map((stop, idx) => {
    const dw = buses.find(b => b.currentStopIndex === idx && b.isDwelling);
    const dwC = dw ? BUS_COLORS[dw.id] : null;
    const next = buses.filter(b => !(b.currentStopIndex === idx && b.isDwelling))
      .map(b => ({ bus: b, eta: calcEta(b, idx), c: BUS_COLORS[b.id] }))
      .filter(e => e.eta > 0 && e.eta < Infinity).sort((a, b) => a.eta - b.eta)[0] || null;
    const hdrBg = dwC ? dwC.main : '#78909C';
    return `<div class="stop-card" style="border-color:${dwC ? dwC.main : '#e5e7eb'};background:${dwC ? dwC.light : '#fff'}">
      <div class="stop-card-head" style="background:${hdrBg}">
        <span class="stop-code-badge">${stop.code}</span>
        <span class="stop-name-text">${stop.name}</span>
        ${dw ? '<span class="ping" style="width:12px;height:12px;border-radius:50%;background:#ef4444;display:inline-block;margin-left:auto;flex-shrink:0"></span>' : ''}
      </div>
      <div class="stop-card-body">
        ${dw && dwC ? `<div class="dwelling-info" style="background:${dwC.main}18"><div class="d-flex align-items-center gap-2"><span class="bus-num-badge" style="background:${dwC.main}">${dw.id}</span><span class="fw-bold small" style="color:${dwC.main}">รถ ${dw.id} จอดอยู่</span></div><div class="d-flex align-items-center justify-content-between mt-1"><span class="small text-muted">ออกใน</span><span class="dwell-mini-timer" style="background:${dwC.main}">${fmtTime(dw.dwellRemaining)}</span></div></div>` : ''}
        ${next ? `<div class="eta-row"><div class="d-flex align-items-center gap-1"><span class="bus-num-badge" style="background:${next.c.main};width:24px;height:24px;font-size:0.75rem">${next.bus.id}</span><span class="fw-semibold small" style="color:${next.c.main}">รถ ${next.bus.id}</span></div><span class="fw-bold small" style="color:${next.c.main}">${fmtMin(next.eta)} นาที</span></div>` : '<div class="no-bus">ไม่มีข้อมูล</div>'}
      </div>
    </div>`;
  }).join('');
}

/** เรียก render ทั้ง 3 ส่วนพร้อมกัน */
function renderAll() { renderMap(); renderBusCards(); renderStopTimeline(); }

// เริ่มต้น: render header/footer, render UI ครั้งแรก
// จากนั้น loop simulation ทุก SIM_TICK ms
renderLayout('tracking', 'ติดตามสด');
renderFooter();
renderAll();
// ทุก SIM_TICK: tick simulation → save state → re-render
setInterval(() => { buses = buses.map(tickBus); saveBuses(buses); renderAll(); }, SIM_TICK);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
