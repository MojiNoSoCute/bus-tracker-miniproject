<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e63462" />
  <title>Bus Tracker - ข้อมูลจุดจอด</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
<header id="site-header" class="sticky-top"></header>

<main class="container-xl px-3 py-4">
  <div class="row g-3" id="stops-grid"></div>
</main>

<footer id="site-footer" class="border-top bg-white py-4 text-center"></footer>

<script src="shared.js"></script>
<script>
/**
 * stops.html (หน้าข้อมูลจุดจอด)
 * แสดง card ข้อมูลจุดจอดทั้ง 10 จุด
 * แต่ละ card มี: รหัส, ชื่อ, สิ่งอำนวยความสะดวก, พิกัด X/Y
 * สีหัว card แบ่งตามกลุ่ม: ชมพู (P1-P3), ส้ม (P4-P6),
 * เขียว (P7-P9), ฟ้า (P10)
 */

/**
 * gradient สีหัว card แต่ละจุดจอด
 * index ตรงกับ stops[] (0-based)
 */
const gradients = [
  "linear-gradient(to right,#e63462,#fe5196)",
  "linear-gradient(to right,#e63462,#fe5196)",
  "linear-gradient(to right,#e63462,#fe5196)",
  "linear-gradient(to right,#FF9800,#FFB74D)",
  "linear-gradient(to right,#FF9800,#FFB74D)",
  "linear-gradient(to right,#FF9800,#FFB74D)",
  "linear-gradient(to right,#4CAF50,#66BB6A)",
  "linear-gradient(to right,#4CAF50,#66BB6A)",
  "linear-gradient(to right,#4CAF50,#66BB6A)",
  "linear-gradient(to right,#26C6DA,#4DD0E1)",
];

/**
 * สร้าง card จุดจอดทั้งหมดและ inject เข้า #stops-grid
 * ใช้ FACILITY_MAP จาก shared.js เพื่อ render badge สิ่งอำนวยความสะดวก
 */
function buildStopsGrid() {
  document.getElementById('stops-grid').innerHTML = stops.map((s, i) => {
    const facs = s.facilities.map(f => {
      const fd = FACILITY_MAP[f]; if (!fd) return '';
      return `<span class="fac-badge" style="background:${fd.color}">${fd.icon} ${fd.label}</span>`;
    }).join('');
    return `<div class="col-sm-6 col-lg-4">
      <div class="stop-info-card">
        <div class="stop-info-head" style="background:${gradients[i]}">
          <span class="stop-num-badge">${s.id}</span>
          <div><h3 class="fs-6 fw-bold mb-0">${s.name}</h3><p class="mb-0 small" style="color:rgba(255,255,255,0.8)">${s.nameEn}</p></div>
        </div>
        <div class="p-3 d-flex flex-column gap-3">
          <div><p class="small text-muted mb-1">รหัสจุดจอด</p><p class="stop-code-big mb-0">${s.code}</p></div>
          <div>
            <p class="small text-muted fw-medium mb-2">สิ่งอำนวยความสะดวกใกล้เคียง</p>
            <div class="d-flex flex-wrap gap-1">${facs}</div>
          </div>
          <div>
            <p class="small text-muted mb-2">ตำแหน่งพิกัดแผนที่</p>
            <div class="row g-2">
              <div class="col-6"><div class="coord-box"><div class="coord-axis">X</div><div class="coord-val">${s.x}</div></div></div>
              <div class="col-6"><div class="coord-box"><div class="coord-axis">Y</div><div class="coord-val">${s.y}</div></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

renderLayout('stops', 'ข้อมูลจุดจอด');
renderFooter();
buildStopsGrid();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
